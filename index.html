<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard | Plataforma de Micro-Learning Premium">
    <title>Dashboard | Micro-Learning</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="smokey-canvas"></canvas>
    <div class="overlay"></div>

    <div id="main-app" class="hidden">
        <header>
            <div class="container header-content">
                <div style="font-size: 1.5rem; font-weight: 700; font-family: 'Outfit';">Mini<span style="color: var(--primary);">Cursos</span></div>
                <div class="user-menu" style="display: flex; align-items: center; gap: 1.5rem;">
                    <span id="display-email" style="font-size: 0.8rem; color: var(--text-muted);"></span>
                    <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <main class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                <h2 style="font-family: 'Outfit'; font-size: 1.8rem;">Mis Cursos</h2>
                <button id="add-btn" style="padding: 0.6rem 1.2rem; border-radius: 0.8rem; border: none; background: var(--success); color: white; font-weight: 700; cursor: pointer; display: none;">+ Nuevo</button>
            </div>
            <div id="filterBar" style="display: flex; gap: 0.5rem; overflow-x: auto; margin-top: 1rem;"></div>
            <div id="cardGrid" class="card-grid"></div>
        </main>

        <nav id="mobileMenu" class="mobile-menu"></nav>

        <!-- Modal Formulario Nuevo Curso (Diseño Nuevo de Imagen) -->
        <div id="courseModal" class="modal-overlay hidden">
            <div class="modal-card">
                <div style="margin-bottom: 1.5rem;">
                    <h2 style="font-family: 'Outfit'; font-size: 1.8rem; color: #1e293b; margin-bottom: 0.5rem;">Añadir Nuevo Curso</h2>
                    <p style="color: #64748b; font-size: 0.95rem;">Completa los datos de la tarjeta.</p>
                </div>
                
                <form id="courseForm">
                    <input type="hidden" id="courseId">
                    
                    <div class="form-row">
                        <div class="form-group-new">
                            <label>Título del Curso</label>
                            <input type="text" id="courseTitle" placeholder="Ej: Diseño de Apps" required>
                        </div>
                    </div>

                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group-new">
                            <label>Duración (min)</label>
                            <input type="number" id="courseDuration" placeholder="20" required>
                        </div>
                        <div class="form-group-new">
                            <label>Categoría</label>
                            <select id="courseCategory" required>
                                <option value="" disabled selected>Selecciona</option>
                                <option value="Diseño">Diseño</option>
                                <option value="Desarrollo">Desarrollo</option>
                                <option value="Soft Skills">Soft Skills</option>
                                <option value="Negocios">Negocios</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group-new">
                            <label>URL del PDF</label>
                            <input type="url" id="coursePdf" placeholder="https://miarchivo.pdf" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                        <button type="button" id="closeModal" class="btn-cancel">Cancelar</button>
                        <button type="submit" class="btn-save">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
