<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard | Plataforma de Micro-Learning Premium">
    <title>Dashboard | Micro-Learning</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="smokey-canvas"></canvas>
    <div class="overlay"></div>

    <div id="main-app" class="hidden">
        <header>
            <div class="container header-content">
                <div style="font-size: 1.5rem; font-weight: 700; font-family: 'Outfit';">Mini<span style="color: var(--primary);">Cursos</span></div>
                <div class="user-menu" style="display: flex; align-items: center; gap: 1.5rem;">
                    <span id="display-email" style="font-size: 0.8rem; color: var(--text-muted);"></span>
                    <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <main class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                <h2 style="font-family: 'Outfit'; font-size: 1.8rem;">Mis Cursos</h2>
                <button id="add-btn" style="padding: 0.6rem 1.2rem; border-radius: 0.8rem; border: none; background: var(--success); color: white; font-weight: 700; cursor: pointer; display: none;">+ Nuevo</button>
            </div>
            <div id="filterBar" style="display: flex; gap: 0.5rem; overflow-x: auto; margin-top: 1rem;"></div>
            <div id="cardGrid" class="card-grid"></div>
        </main>

        <nav id="mobileMenu" class="mobile-menu"></nav>

        <!-- Modal Formulario Nuevo Curso (Diseño Premium) -->
        <div id="courseModal" class="modal-overlay hidden">
            <div class="modal-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3 style="font-family: 'Outfit'; font-size: 1.5rem;">Gestión de Curso</h3>
                    <button id="closeModal" class="btn-icon">✕</button>
                </div>
                <form id="courseForm">
                    <input type="hidden" id="courseId">
                    <div class="form-group">
                        <input type="text" id="courseTitle" placeholder=" " required>
                        <label>Título del Curso</label>
                    </div>
                    <div class="form-group">
                        <select id="courseCategory" required style="width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--glass-border); color: white; padding: 0.6rem 0; outline: none;">
                            <option value="" disabled selected style="background: var(--bg-dark);">Seleccionar Categoría</option>
                            <option value="Diseño" style="background: var(--bg-dark);">Diseño</option>
                            <option value="Desarrollo" style="background: var(--bg-dark);">Desarrollo</option>
                            <option value="Soft Skills" style="background: var(--bg-dark);">Soft Skills</option>
                            <option value="Negocios" style="background: var(--bg-dark);">Negocios</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-top: 2rem;">
                        <input type="number" id="courseDuration" placeholder=" " required>
                        <label>Duración (minutos)</label>
                    </div>
                    <div class="form-group">
                        <input type="url" id="coursePdf" placeholder=" " required>
                        <label>URL del PDF (Google Drive/Dropbox/etc)</label>
                    </div>
                    <button type="submit" class="btn-signin" style="margin-top: 1rem;">Guardar Curso</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
