<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login | Plataforma de Micro-Learning">
    <title>Iniciar Sesión | Micro-Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="smokey-canvas"></canvas>
    <div class="overlay"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family: 'Outfit'; margin-bottom: 0.5rem; font-size: 1.8rem;">¡Bienvenido!</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Inicia sesión para continuar</p>
            
            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Correo Electrónico
                    </label>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Contraseña
                    </label>
                </div>
                <button type="submit" class="btn-signin">Iniciar Sesión</button>
            </form>

            <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem; color: var(--text-muted); font-size: 0.7rem;">
                <div style="flex: 1; height: 1px; background: var(--glass-border);"></div> O CONTINÚA CON <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
            </div>

            <button id="google-btn" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039L38.802 8.841C34.553 4.806 29.613 2.5 24 2.5C11.983 2.5 2.5 11.983 2.5 24s9.483 21.5 21.5 21.5S45.5 36.017 45.5 24c0-1.538-.135-3.022-.389-4.417z"></path><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12.5 24 12.5c3.059 0 5.842 1.154 7.961 3.039l5.839-5.841C34.553 4.806 29.613 2.5 24 2.5C16.318 2.5 9.642 6.723 6.306 14.691z"></path><path fill="#4CAF50" d="M24 45.5c5.613 0 10.553-2.306 14.802-6.341l-5.839-5.841C30.842 35.846 27.059 38 24 38c-5.039 0-9.345-2.608-11.124-6.481l-6.571 4.819C9.642 41.277 16.318 45.5 24 45.5z"></path><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l5.839 5.841C44.196 35.123 45.5 29.837 45.5 24c0-1.538-.135-3.022-.389-4.417z"></path></svg>
                Iniciar sesión con Google
            </button>
        </div>
    </div>
    
    <script type="module" src="/src/login.js"></script>
</body>
</html>
